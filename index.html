<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周边国家好课 · Goodie Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5F0E8;
    --sand-dark: #EAE3D5;
    --sand-mid: #D4C9B5;
    --ink: #1A1714;
    --ink-light: #4A4540;
    --ink-muted: #8A8078;
    --terra: #C4673A;
    --terra-light: #F0DDD3;
    --terra-mid: #E09070;
    --sage: #5A7A5A;
    --sage-light: #D8E8D8;
    --sky: #4A7A9B;
    --sky-light: #D5E8F0;
    --gold: #C49A3A;
    --gold-light: #F5EAD0;
    --lavender: #7A6AAA;
    --lavender-light: #EAE5F5;
    --rose: #B04060;
    --rose-light: #F5DDE8;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 20px rgba(26,23,20,0.08);
    --shadow-hover: 0 8px 32px rgba(26,23,20,0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    background: var(--ink);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 300;
    color: var(--sand);
    letter-spacing: 0.01em;
  }
  .logo span { color: var(--terra-mid); font-style: italic; }
  .logo sub { font-size: 10px; color: var(--ink-muted); font-family: 'DM Sans', sans-serif; font-style: normal; vertical-align: middle; margin-left: 6px; letter-spacing: 0.08em; }
  .btn-submit {
    background: var(--terra);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
    font-weight: 500;
  }
  .btn-submit:hover { background: #b35a30; transform: translateY(-1px); }

  .hero {
    padding: 36px 24px 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 300;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .hero h1 em { color: var(--terra); font-style: italic; }
  .hero p { color: var(--ink-muted); font-size: 13px; }

  /* FILTERS */
  .filters {
    background: #fff;
    border-bottom: 1px solid var(--sand-dark);
    position: sticky;
    top: 60px;
    z-index: 90;
  }
  .filters-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .select-wrap { position: relative; display: inline-block; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 11px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    font-size: 10px;
    color: var(--ink-muted);
  }
  .filters select, .filters input[type="month"] {
    background: var(--sand);
    border: 1.5px solid var(--sand-mid);
    border-radius: 20px;
    padding: 6px 28px 6px 13px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
    appearance: none;
    -webkit-appearance: none;
  }
  .filters select:focus, .filters input[type="month"]:focus { border-color: var(--terra); }
  .filter-clear {
    background: none;
    border: 1.5px solid var(--sand-mid);
    border-radius: 20px;
    padding: 6px 13px;
    font-size: 13px;
    color: var(--ink-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
  }
  .filter-clear:hover { border-color: var(--terra); color: var(--terra); }
  .view-toggle {
    margin-left: auto;
    display: flex;
    background: var(--sand-dark);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }
  .view-btn {
    border: none; background: none;
    padding: 5px 12px;
    border-radius: 16px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--ink-muted);
    transition: all .2s;
    font-weight: 500;
  }
  .view-btn.active { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

  /* TYPE FILTER — two-row layout */
  .type-filter-wrap {
    background: #fff;
    border-bottom: 1px solid var(--sand-dark);
  }
  .type-filter-row {
    max-width: 900px;
    margin: 0 auto;
    padding: 8px 24px 8px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .type-subrow {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 10px;
    display: none;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    border-top: 1px dashed var(--sand-mid);
    padding-top: 8px;
  }
  .type-subrow.visible { display: flex; }
  .type-cat-label { font-size: 11px; color: var(--ink-muted); margin-right: 2px; white-space: nowrap; }
  /* shared pill base */
  .type-pill {
    border: 1.5px solid var(--sand-mid);
    background: none;
    border-radius: 14px;
    padding: 5px 13px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-light);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    line-height: 1;
  }
  .type-pill:hover { border-color: var(--terra-mid); color: var(--terra); }
  /* "全部课程" pill */
  .type-pill.all-pill { }
  .type-pill.all-pill.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  /* Category (大类) pill — bolder, filled sand */
  .type-pill.cat-pill {
    font-weight: 500;
    background: var(--sand);
    border-color: var(--sand-mid);
    color: var(--ink);
  }
  .type-pill.cat-pill:hover { background: var(--terra-light); border-color: var(--terra-mid); color: var(--terra); }
  .type-pill.cat-pill.open  { background: var(--ink); border-color: var(--ink); color: #fff; }
  .cat-arrow { font-size: 10px; margin-left: 4px; display: inline-block; transition: transform .2s; }
  .type-pill.cat-pill.open .cat-arrow { transform: rotate(180deg); }
  /* Sub-type pill */
  .type-pill.sub-pill { font-size: 12px; }
  .type-pill.sub-pill.active { background: var(--terra); border-color: var(--terra); color: #fff; }

  .main { max-width: 900px; margin: 0 auto; padding: 24px; }

  /* CALENDAR */
  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .cal-nav-btn {
    background: none;
    border: 1.5px solid var(--sand-mid);
    border-radius: 50%;
    width: 34px; height: 34px;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-light);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .cal-nav-btn:hover { border-color: var(--terra); color: var(--terra); }
  .cal-month-label {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    min-width: 160px;
    text-align: center;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-muted);
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .cal-day {
    min-height: 70px;
    background: #fff;
    border-radius: var(--radius-sm);
    padding: 6px;
    cursor: pointer;
    transition: all .2s;
    border: 1.5px solid transparent;
    position: relative;
  }
  .cal-day:hover { border-color: var(--terra-mid); transform: translateY(-1px); box-shadow: var(--shadow); }
  .cal-day.empty { background: transparent; cursor: default; border-color: transparent; }
  .cal-day.empty:hover { transform: none; box-shadow: none; }
  .cal-day.today { border-color: var(--terra); }
  .cal-day.selected { background: var(--terra-light); border-color: var(--terra); }
  .day-num {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-light);
    display: block;
    margin-bottom: 3px;
  }
  .cal-day.today .day-num { color: var(--terra); font-weight: 700; }
  .event-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .event-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  /* category dot colors — matches the big pill dots */
  .dot-sport    { background: #E07030; }
  .dot-wellness { background: var(--sage); }
  .dot-culture  { background: var(--lavender); }
  .dot-food     { background: var(--gold); }
  .dot-beauty   { background: var(--rose); }
  .dot-craft    { background: var(--sky); }
  .dot-other    { background: var(--sand-mid); }
  .dot-more { font-size: 9px; color: var(--ink-muted); display: flex; align-items: center; line-height: 1; }

  /* DAY TABLE PANEL */
  .event-panel { margin-top: 20px; display: none; }
  .event-panel.visible { display: block; }
  .event-panel-header {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 300;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .close-panel {
    background: none; border: none;
    font-size: 18px; cursor: pointer;
    color: var(--ink-muted); padding: 4px 8px;
    border-radius: 6px; transition: color .2s;
  }
  .close-panel:hover { color: var(--terra); }

  /* DAY TABLE */
  .day-table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
  .day-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    font-size: 13px;
  }
  .day-table th {
    background: var(--ink);
    color: var(--sand);
    padding: 10px 14px;
    text-align: left;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .day-table th:first-child { border-radius: var(--radius) 0 0 0; }
  .day-table th:last-child { border-radius: 0 var(--radius) 0 0; }
  .day-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--sand-dark);
    vertical-align: top;
    color: var(--ink-light);
  }
  .day-table tr:last-child td { border-bottom: none; }
  .day-table tr:hover td { background: var(--sand); cursor: pointer; }
  .day-table .td-name { font-weight: 500; color: var(--ink); }
  .day-table .td-price { color: var(--terra); font-weight: 500; white-space: nowrap; }
  .day-table .td-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    white-space: nowrap;
  }

  /* CARD GRID (used when specific type selected) */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 12px;
  }
  .course-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    transition: all .25s;
    cursor: pointer;
    border: 1.5px solid transparent;
    position: relative;
    overflow: hidden;
    animation: fadeUp .25s ease both;
  }
  .course-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--sand-dark); }
  .card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-type-badge {
    font-size: 10px; font-weight: 500;
    padding: 3px 9px; border-radius: 10px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .card-price { font-size: 13px; font-weight: 500; color: var(--terra); }
  .card-name { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 7px; line-height: 1.35; }
  .card-meta { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--ink-muted); }
  .card-meta-row { display: flex; align-items: center; gap: 5px; }
  .card-desc {
    margin-top: 10px; font-size: 12px; color: var(--ink-muted); line-height: 1.5;
    border-top: 1px solid var(--sand-dark); padding-top: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-footer {
    margin-top: 10px; display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--ink-muted);
  }
  .card-lang-badge { background: var(--sand); border-radius: 8px; padding: 2px 8px; }

  /* LIST VIEW */
  .list-view { display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    background: #fff; border-radius: var(--radius-sm);
    padding: 12px 16px; display: flex; gap: 12px; align-items: center;
    box-shadow: 0 1px 8px rgba(26,23,20,.06); cursor: pointer;
    transition: all .2s; border: 1.5px solid transparent;
    animation: fadeUp .2s ease both;
  }
  .list-item:hover { border-color: var(--sand-mid); box-shadow: var(--shadow); transform: translateX(2px); }
  .list-date-col { min-width: 44px; text-align: center; flex-shrink: 0; }
  .list-date-day { font-size: 20px; font-weight: 500; line-height: 1; color: var(--terra); }
  .list-date-month { font-size: 10px; color: var(--ink-muted); text-transform: uppercase; }
  .list-divider { width: 1px; height: 36px; background: var(--sand-mid); flex-shrink: 0; }
  .list-content { flex: 1; min-width: 0; }
  .list-name { font-weight: 500; font-size: 13px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
  .list-right { text-align: right; flex-shrink: 0; }
  .list-price { font-size: 13px; font-weight: 500; color: var(--terra); }
  .list-city { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-muted); }
  .empty-state .emoji { font-size: 38px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* DETAIL MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,23,20,0.5);
    z-index: 200; display: flex;
    align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .25s; padding: 0;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--sand);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(40px);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    padding: 0 0 40px;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--sand-mid); border-radius: 2px; margin: 14px auto 20px; }
  .modal-inner { padding: 0 24px; }
  .modal-title { font-family: 'Fraunces', serif; font-size: 21px; font-weight: 300; margin-bottom: 4px; }
  .modal-subtitle { font-size: 13px; color: var(--ink-muted); margin-bottom: 18px; }
  .modal-detail-row { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
  .modal-icon { font-size: 15px; flex-shrink: 0; margin-top: 2px; }
  .modal-detail-label { font-size: 10px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .07em; }
  .modal-detail-value { font-size: 13px; color: var(--ink); margin-top: 1px; }
  .modal-desc-box {
    background: #fff; border-radius: var(--radius-sm);
    padding: 14px; margin-top: 14px;
    font-size: 13px; color: var(--ink-light); line-height: 1.6;
  }
  .modal-price-big {
    background: var(--terra-light); border-radius: var(--radius-sm);
    padding: 12px 16px; display: flex;
    align-items: center; justify-content: space-between; margin-top: 14px;
  }
  .modal-price-label { font-size: 12px; color: var(--terra); font-weight: 500; }
  .modal-price-value { font-size: 20px; font-weight: 500; color: var(--terra); font-family: 'Fraunces', serif; }
  .modal-source { font-size: 11px; color: var(--ink-muted); margin-top: 14px; display: flex; align-items: center; gap: 4px; }

  /* SUBMIT FORM */
  .form-section { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--ink-light); margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: #fff;
    border: 1.5px solid var(--sand-mid);
    border-radius: var(--radius-sm);
    padding: 9px 13px; font-size: 13px;
    font-family: 'DM Sans', sans-serif; color: var(--ink);
    outline: none; transition: border-color .2s; appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--terra); }
  .form-textarea { min-height: 76px; resize: vertical; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-submit-btn {
    width: 100%; background: var(--terra); color: #fff;
    border: none; border-radius: var(--radius);
    padding: 13px; font-size: 14px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: background .2s; margin-top: 6px;
  }
  .form-submit-btn:hover { background: #b35a30; }
  .form-notice { font-size: 11px; color: var(--ink-muted); text-align: center; margin-top: 10px; line-height: 1.5; }
  .pending-notice {
    background: var(--gold-light); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 12px; color: #7A5A10;
    margin-bottom: 14px; display: flex; gap: 8px; align-items: flex-start;
  }

  /* CONTACT POPUP */
  .contact-popup {
    position: fixed; inset: 0;
    background: rgba(26,23,20,0.5);
    z-index: 300; display: flex;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
    padding: 24px;
  }
  .contact-popup.open { opacity: 1; pointer-events: all; }
  .contact-card {
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
    width: 100%;
    transform: scale(0.92);
    transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .contact-popup.open .contact-card { transform: scale(1); }
  .contact-icon { font-size: 36px; margin-bottom: 12px; }
  .contact-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 300; margin-bottom: 8px; }
  .contact-text { font-size: 14px; color: var(--ink-muted); line-height: 1.6; margin-bottom: 20px; }
  .contact-highlight {
    background: var(--terra-light);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 500;
    color: var(--terra);
    margin-bottom: 20px;
  }
  .contact-close {
    background: var(--sand);
    border: none; border-radius: 20px;
    padding: 9px 24px; font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-light); cursor: pointer;
    transition: background .2s;
  }
  .contact-close:hover { background: var(--sand-dark); }

  footer {
    background: var(--ink);
    color: var(--ink-muted);
    text-align: center;
    padding: 24px;
    font-size: 12px;
    margin-top: 60px;
  }
  footer .footer-link {
    color: var(--sand-mid);
    text-decoration: none;
    cursor: pointer;
    transition: color .2s;
  }
  footer .footer-link:hover { color: var(--terra-mid); }

  .tab-section { display: none; }
  .tab-section.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* TYPE COLOR MAPS */
  .acc-sport    { background: #E07030; }
  .acc-wellness { background: var(--sage); }
  .acc-culture  { background: var(--lavender); }
  .acc-food     { background: var(--gold); }
  .acc-beauty   { background: var(--rose); }
  .acc-craft    { background: var(--sky); }
  .acc-other    { background: var(--sand-mid); }

  .badge-sport    { background: #FFE4CC; color: #B05020; }
  .badge-wellness { background: var(--sage-light); color: var(--sage); }
  .badge-culture  { background: var(--lavender-light); color: var(--lavender); }
  .badge-food     { background: var(--gold-light); color: #9A7020; }

// 飞书 Wiki 数据加载（需要后端代理，见说明）
// ═══════════════════════════════════════════════════════
async function loadFromFeishu() {
  if (!FEISHU_CONFIG.enabled || !FEISHU_CONFIG.proxyUrl) return;
  try {
    const res = await fetch(FEISHU_CONFIG.proxyUrl);
    const data = await res.json();
    if (data && Array.isArray(data.courses)) {
      COURSES.length = 0;
      data.courses.forEach((c, i) => COURSES.push({ id: i + 1, ...c }));
      buildTypeFilter();
      buildCityOptions(null);
      jumpToFirstMonthWithData();
      applyFilters();
    }
  } catch (e) {
    console.warn('飞书数据加载失败，使用本地示例数据', e);
  }
}

// If current month has no courses, jump to the first month that does
function jumpToFirstMonthWithData() {
  const todayStr = new Date().toISOString().slice(0, 7); // "2026-04"
  const dates = COURSES.map(c => c.date).filter(Boolean).sort();
  if (!dates.length) return;
  // If there are courses in current month or later, find the nearest upcoming one
  const upcoming = dates.find(d => d >= todayStr) || dates[0];
  const [y, m] = upcoming.split('-');
  currentYear = parseInt(y);
  currentMonth = parseInt(m) - 1;
}

// ═══════════════════════════════════════════════════════
let openCat = null; // which category is currently expanded

function buildTypeFilter() {
  const row = document.getElementById('type-filter-row');
  row.innerHTML = '<span class="type-cat-label">大类：</span>';

  const catsInData = [...new Set(COURSES.map(c => c.category || TYPE_TO_CAT[c.type] || '其他'))];

  // "全部课程" pill
  const allPill = document.createElement('button');
  allPill.className = 'type-pill all-pill active';
  allPill.id = 'pill-all';
  allPill.textContent = '全部课程';
  allPill.onclick = () => {
    openCat = null; activeTypePill = '全部'; activeCatPill = null;
    renderSubrow(); updateCatPillStates(); applyFilters();
  };
  row.appendChild(allPill);

  // One colored-dot pill per category
  catsInData.forEach(cat => {
    const cls   = CAT_CLASS[cat] || 'other';
    const color = CAT_DOT_COLOR[cls] || CAT_DOT_COLOR.other;
    const pill  = document.createElement('button');
    pill.className = 'type-pill cat-pill';
    pill.dataset.cat = cat;
    // colored dot + label + arrow
    pill.innerHTML =
      `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color};margin-right:5px;vertical-align:middle;flex-shrink:0"></span>` +
      cat +
      `<span class="cat-arrow">▾</span>`;
    pill.onclick = () => {
      if (openCat === cat) {
        openCat = null; activeTypePill = '全部'; activeCatPill = null;
      } else {
        openCat = cat; activeCatPill = cat; activeTypePill = cat;
      }
      renderSubrow(); updateCatPillStates(); applyFilters();
    };
    row.appendChild(pill);
  });
}

function renderSubrow() {
  const subrow = document.getElementById('type-subrow');
  subrow.innerHTML = '<span class="type-cat-label">小类：</span>';

  if (!openCat) {
    subrow.classList.remove('visible');
    return;
  }

  // Gather sub-types for the open category from actual data
  const typesInCat = [...new Set(
    COURSES
      .filter(c => (c.category || TYPE_TO_CAT[c.type] || '其他') === openCat)
      .map(c => c.type)
      .filter(Boolean)
  )];

  if (!typesInCat.length) {
    subrow.classList.remove('visible');
    return;
  }

  // "全部 [大类]" sub-pill
  const allSub = document.createElement('button');
  allSub.className = 'type-pill sub-pill' + (activeCatPill === openCat && activeTypePill === openCat ? ' active' : '');
  allSub.textContent = '全部' + openCat;
  allSub.onclick = () => {
    activeTypePill = openCat;
    activeCatPill = openCat;
    renderSubrow();
    applyFilters();
  };
  subrow.appendChild(allSub);

  typesInCat.forEach(t => {
    const pill = document.createElement('button');
    pill.className = 'type-pill sub-pill' + (activeTypePill === t ? ' active' : '');
    pill.textContent = t;
    pill.onclick = () => {
      activeTypePill = t;
      activeCatPill = openCat;
      renderSubrow();
      applyFilters();
    };
    subrow.appendChild(pill);
  });

  subrow.classList.add('visible');
}

function updateCatPillStates() {
  // Reset all pill states
  document.getElementById('pill-all').classList.toggle('active', !openCat);
  document.querySelectorAll('.type-pill.cat-pill').forEach(p => {
    const isCurrent = p.dataset.cat === openCat;
    p.classList.toggle('open', isCurrent);
  });
}

// ═══════════════════════════════════════════════════════
// CITY DROPDOWN — filtered by selected country
// ═══════════════════════════════════════════════════════
function buildCityOptions(filterCountry) {
  const sel = document.getElementById('filter-city');
  const prev = sel.value;
  const source = filterCountry
    ? COURSES.filter(c => c.country === filterCountry)
    : COURSES;
  const cities = [...new Set(source.map(c => c.city))].sort();
  sel.innerHTML = '<option value="">全部城市</option>';
  cities.forEach(city => {
    const opt = document.createElement('option');
    opt.value = city; opt.textContent = city;
    sel.appendChild(opt);
  });
  // restore previous selection only if it's still valid
  if (prev && cities.includes(prev)) sel.value = prev;
}

function onRegionChange() {
  const region = document.getElementById('filter-region').value;
  document.getElementById('filter-city').value = ''; // reset city first
  buildCityOptions(region || null);
  applyFilters();
}

// ═══════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════
function applyFilters() {
  const region = document.getElementById('filter-region').value;
  const city   = document.getElementById('filter-city').value;
  const month  = document.getElementById('filter-month').value;

  filtered = COURSES.filter(c => {
    if (region && c.country !== region) return false;
    if (city   && c.city   !== city)   return false;
    if (month  && !c.date.startsWith(month)) return false;
    // Type pill filter
    if (activeTypePill && activeTypePill !== '全部') {
      if (activeCatPill) {
        // category filter
        const cc = c.category || TYPE_TO_CAT[c.type] || '其他';
        if (cc !== activeCatPill) return false;
      } else {
        if (c.type !== activeTypePill) return false;
      }
    }
    return true;
  });

  // If user picked a specific month, jump calendar to that month
  if (month) {
    const [y, m] = month.split('-');
    currentYear = parseInt(y);
    currentMonth = parseInt(m) - 1;
  }

  closePanel();
  if (currentView === 'calendar') renderCalendar();
  else renderList();
}

function clearFilters() {
  document.getElementById('filter-region').value = '';
  document.getElementById('filter-city').value   = '';
  document.getElementById('filter-month').value  = '';
  buildCityOptions(null); // restore all cities
  activeTypePill = '全部';
  activeCatPill = null;
  openCat = null;
  renderSubrow();
  updateCatPillStates();
  filtered = [...COURSES];
  closePanel();
  if (currentView === 'calendar') renderCalendar();
  else renderList();
}

// ═══════════════════════════════════════════════════════
// VIEW SWITCH
// ═══════════════════════════════════════════════════════
function switchView(v) {
  currentView = v;
  document.getElementById('view-calendar').classList.toggle('active', v === 'calendar');
  document.getElementById('view-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-calendar').classList.toggle('active', v === 'calendar');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  if (v === 'list') renderList();
  else renderCalendar();
}

// ═══════════════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════════════
function renderCalendar() {
  document.getElementById('cal-label').textContent = `${currentYear} 年 ${MONTHS_CN[currentMonth]}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['日','一','二','三','四','五','六'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-weekday';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvents = filtered.filter(c => c.date === dateStr);
    const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d;

    const cell = document.createElement('div');
    cell.className = 'cal-day' + (isToday ? ' today' : '') + (selectedDate === dateStr ? ' selected' : '');

    cell.innerHTML = `<span class="day-num">${d}</span>`;

    if (dayEvents.length) {
      const dots = document.createElement('div');
      dots.className = 'event-dots';
      // Show one dot per unique category (deduped), max 6
      const seenCats = new Set();
      dayEvents.forEach(ev => {
        const cls = getCatClass(ev.type, ev.category);
        if (!seenCats.has(cls) && seenCats.size < 6) {
          seenCats.add(cls);
          const dot = document.createElement('span');
          dot.className = `event-dot dot-${cls}`;
          dot.title = ev.category || ev.type;
          dots.appendChild(dot);
        }
      });
      cell.appendChild(dots);
      cell.onclick = () => showDayEvents(dateStr, dayEvents);
    }
    grid.appendChild(cell);
  }
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  closePanel();
  selectedDate = null;
  renderCalendar();
}

function showDayEvents(dateStr, events) {
  selectedDate = dateStr;
  const [y, m, d] = dateStr.split('-');
  document.getElementById('event-panel-title').textContent =
    `${y}年${parseInt(m)}月${parseInt(d)}日 · ${events.length} 门课程`;

  const body = document.getElementById('event-panel-body');
  const isAllTypes = !activeTypePill || activeTypePill === '全部';

  if (isAllTypes) {
    // TABLE view: all types
    body.innerHTML = buildDayTable(events);
  } else {
    // CARD view: specific type
    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    events.forEach((ev, i) => {
      const card = buildCard(ev);
      card.style.animationDelay = `${i * 0.06}s`;
      grid.appendChild(card);
    });
    body.innerHTML = '';
    body.appendChild(grid);
  }

  const panel = document.getElementById('event-panel');
  panel.classList.add('visible');
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  renderCalendar();
}

function buildDayTable(events) {
  const rows = events.map(ev => {
    const cls = getCatClass(ev.type, ev.category);
    return `<tr onclick="openDetailModal(${ev.id})">
      <td class="td-name">${ev.name}</td>
      <td><span class="td-badge badge-${cls}">${ev.type}</span></td>
      <td>${ev.time || '—'}</td>
      <td>${ev.address || ev.city || '—'}</td>
      <td class="td-price">${ev.price}</td>
    </tr>`;
  }).join('');

  return `<div class="day-table-wrap">
    <table class="day-table">
      <thead>
        <tr>
          <th>机构/课程名</th>
          <th>类型</th>
          <th>时间段</th>
          <th>地址</th>
          <th>参考价格</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function closePanel() {
  document.getElementById('event-panel').classList.remove('visible');
  selectedDate = null;
}

// ═══════════════════════════════════════════════════════
// LIST VIEW
// ═══════════════════════════════════════════════════════
function renderList() {
  const container = document.getElementById('list-container');
  container.innerHTML = '';
  const sorted = [...filtered].sort((a, b) => a.date.localeCompare(b.date));

  if (!sorted.length) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>没有符合条件的课程<br>试试调整筛选条件</p></div>`;
    return;
  }

  sorted.forEach((ev, i) => {
    const [, m, d] = ev.date.split('-');
    const cls = getCatClass(ev.type, ev.category);
    const el = document.createElement('div');
    el.className = 'list-item';
    el.style.animationDelay = `${i * 0.04}s`;
    el.innerHTML = `
      <div class="list-date-col">
        <div class="list-date-day">${parseInt(d)}</div>
        <div class="list-date-month">${MONTHS_CN[parseInt(m)-1].replace('月','')}</div>
      </div>
      <div class="list-divider"></div>
      <div class="list-content">
        <div class="list-name">${ev.name}</div>
        <div class="list-sub">${ev.city} · <span class="td-badge badge-${cls}" style="padding:1px 7px;border-radius:8px;font-size:10px">${ev.type}</span> · ${ev.time || '时间待定'}</div>
      </div>
      <div class="list-right">
        <div class="list-price">${ev.price}</div>
        <div class="list-city">${ev.lang || ''}</div>
      </div>
    `;
    el.onclick = () => openDetailModal(ev.id);
    container.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════
// CARD BUILDER
// ═══════════════════════════════════════════════════════
function buildCard(ev) {
  const cls = getCatClass(ev.type, ev.category);
  const el = document.createElement('div');
  el.className = 'course-card';
  el.innerHTML = `
    <div class="card-accent acc-${cls}"></div>
    <div class="card-header">
      <span class="card-type-badge badge-${cls}">${ev.type}</span>
      <span class="card-price">${ev.price}</span>
    </div>
    <div class="card-name">${ev.name}</div>
    <div class="card-meta">
      <div class="card-meta-row">📍 ${ev.country} · ${ev.city}</div>
      <div class="card-meta-row">🕐 ${ev.time || '待定'}</div>
      ${ev.lang ? `<div class="card-meta-row">💬 ${ev.lang}</div>` : ''}
    </div>
    ${ev.desc ? `<div class="card-desc">${ev.desc}</div>` : ''}
    <div class="card-footer">
      <span class="card-lang-badge">${ev.weekday ? '周' + ev.weekday : ''}</span>
      <span>${ev.source || ''}</span>
    </div>
  `;
  el.onclick = () => openDetailModal(ev.id);
  return el;
}

// ═══════════════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════════════
function openDetailModal(idOrObj) {
  const ev = typeof idOrObj === 'object' ? idOrObj : COURSES.find(c => c.id === idOrObj);
  if (!ev) return;
  const cls = getCatClass(ev.type, ev.category);
  const [y, m, d] = ev.date.split('-');

  document.getElementById('detail-modal-content').innerHTML = `
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
      <span class="card-type-badge badge-${cls}" style="font-size:11px;padding:4px 12px">${ev.type}</span>
      <span style="font-size:12px;color:var(--ink-muted)">${ev.country} · ${ev.category || ''}</span>
    </div>
    <div class="modal-title">${ev.name}</div>
    <div class="modal-subtitle">${ev.city}</div>

    <div class="modal-detail-row">
      <span class="modal-icon">📅</span>
      <div>
        <div class="modal-detail-label">上课日期 · 星期</div>
        <div class="modal-detail-value">${y}年${parseInt(m)}月${parseInt(d)}日 &nbsp;周${ev.weekday || '?'}</div>
      </div>
    </div>
    <div class="modal-detail-row">
      <span class="modal-icon">🕐</span>
      <div>
        <div class="modal-detail-label">时间段</div>
        <div class="modal-detail-value">${ev.time || '请向平台确认'}</div>
      </div>
    </div>
    ${ev.address ? `<div class="modal-detail-row">
      <span class="modal-icon">📍</span>
      <div>
        <div class="modal-detail-label">地址</div>
        <div class="modal-detail-value">${ev.address}</div>
      </div>
    </div>` : ''}
    <div class="modal-detail-row">
      <span class="modal-icon">💬</span>
      <div>
        <div class="modal-detail-label">授课语言</div>
        <div class="modal-detail-value">${ev.lang || '未注明'}</div>
      </div>
    </div>
    ${ev.desc ? `<div class="modal-desc-box">${ev.desc}</div>` : ''}
    <div class="modal-price-big">
      <span class="modal-price-label">参考价格</span>
      <span class="modal-price-value">${ev.price}</span>
    </div>
    <div class="modal-source">ℹ️ 信息来源：${ev.source || '不详'}</div>
    <p style="font-size:11px;color:var(--ink-muted);margin-top:12px;line-height:1.5">价格及时间仅供参考，请以实际预订页面为准。</p>
  `;
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetailModal(e) {
  if (!e || e.target === document.getElementById('detail-modal')) {
    document.getElementById('detail-modal').classList.remove('open');
  }
}

// ═══════════════════════════════════════════════════════
// SUBMIT FORM
// ═══════════════════════════════════════════════════════
function openSubmitForm() {
  document.getElementById('submit-modal').classList.add('open');
}
function closeSubmitModal(e) {
  if (e.target === document.getElementById('submit-modal')) {
    document.getElementById('submit-modal').classList.remove('open');
  }
}
function submitCourse() {
  const required = ['sub-country','sub-city','sub-name','sub-cat','sub-type','sub-date'];
  for (const id of required) {
    if (!document.getElementById(id).value.trim()) {
      alert('请填写带 * 的必填项');
      return;
    }
  }
  const payload = {
    country:  document.getElementById('sub-country').value,
    city:     document.getElementById('sub-city').value,
    name:     document.getElementById('sub-name').value,
    category: document.getElementById('sub-cat').value,
    type:     document.getElementById('sub-type').value,
    date:     document.getElementById('sub-date').value,
    time:     document.getElementById('sub-time').value,
    price:    document.getElementById('sub-price').value,
    address:  document.getElementById('sub-addr').value,
    lang:     document.getElementById('sub-lang').value,
    source:   document.getElementById('sub-source').value,
    desc:     document.getElementById('sub-desc').value,
    contact:  document.getElementById('sub-contact').value,
    status:   'pending',
    submitted_at: new Date().toISOString(),
  };
  console.log('Submitted (pending review):', payload);
  // TODO: POST to your backend / Feishu webhook
  // fetch('/api/submit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
  document.getElementById('submit-modal').classList.remove('open');
  setTimeout(() => alert('✅ 提交成功！审核后将发布，感谢你的分享 🙏'), 300);
}

  document.getElementById('contact-popup').classList.add('open');
}
function closeContactPopup(e) {
  if (!e || e.target === document.getElementById('contact-popup')) {
    document.getElementById('contact-popup').classList.remove('open');

}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildTypeFilter();
buildCityOptions(null);
filtered = [...COURSES];
renderCalendar();
loadFromFeishu(); // no-op unless FEISHU_CONFIG.enabled = true
</script>
